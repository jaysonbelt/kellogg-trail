<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>The Kellogg Trail</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#000;display:flex;align-items:center;justify-content:center;min-height:100vh;overflow:hidden}
canvas{display:block;image-rendering:pixelated;image-rendering:crisp-edges}
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
'use strict';
const cv=document.getElementById('c');
const cx=cv.getContext('2d');
const W=640,H=400;
const DPR=Math.min(window.devicePixelRatio||1,2);
cv.width=W*DPR;cv.height=H*DPR;
cx.scale(DPR,DPR);

function resize(){
  const s=Math.min(window.innerWidth/W,window.innerHeight/H);
  cv.style.width=Math.floor(W*s)+'px';
  cv.style.height=Math.floor(H*s)+'px';
}
resize();
window.addEventListener('resize',resize);

// ═══════════════════════════════════════════════
// DRAWING PRIMITIVES
// ═══════════════════════════════════════════════
function box(x,y,w,h,col){cx.fillStyle=col;cx.fillRect(~~x,~~y,~~w,~~h);}
function hln(y,col){cx.fillStyle=col;cx.fillRect(0,~~y,W,1);}
function vln(x,y1,y2,col){cx.fillStyle=col;cx.fillRect(~~x,~~y1,1,~~y2-~~y1);}

// DOS-style bordered box
function dbox(x,y,w,h,bg,border){
  box(x,y,w,h,bg);
  cx.strokeStyle=border;cx.lineWidth=1;cx.strokeRect(x+0.5,y+0.5,w-1,h-1);
  cx.strokeStyle=darken(border,60);cx.strokeRect(x+2.5,y+2.5,w-5,h-5);
}

function darken(hex,amt){
  let n=parseInt(hex.replace('#',''),16);
  const r=Math.max(0,(n>>16&255)-amt),g=Math.max(0,(n>>8&255)-amt),b=Math.max(0,(n&255)-amt);
  return '#'+(r<16?'0':'')+r.toString(16)+(g<16?'0':'')+g.toString(16)+(b<16?'0':'')+b.toString(16);
}

// Pixel text
function T(str,x,y,col,sz=8){
  cx.font=sz+'px "Courier New",monospace';
  cx.fillStyle=col;cx.textBaseline='top';cx.textAlign='left';
  cx.fillText(str,~~x,~~y);
}
function TC(str,y,col,sz=8){
  cx.font=sz+'px "Courier New",monospace';
  cx.fillStyle=col;cx.textBaseline='top';cx.textAlign='center';
  cx.fillText(str,W/2,~~y);
}
function TR(str,x,y,col,sz=8){
  cx.font=sz+'px "Courier New",monospace';
  cx.fillStyle=col;cx.textBaseline='top';cx.textAlign='right';
  cx.fillText(str,~~x,~~y);
}
function TW(str,sz=8){
  cx.font=sz+'px "Courier New",monospace';
  return cx.measureText(str).width;
}
function wrap(str,maxW,sz=8){
  const words=str.split(' '),lines=[];
  let cur='';
  for(const w of words){
    const t=cur?cur+' '+w:w;
    if(TW(t,sz)>maxW&&cur){lines.push(cur);cur=w;}else cur=t;
  }
  if(cur)lines.push(cur);
  return lines;
}

// CGA palette
const C={
  BK:'#000000',WH:'#ffffff',CY:'#55ffff',GR:'#55ff55',YL:'#ffff55',
  RD:'#ff5555',MG:'#ff55ff',BL:'#5555ff',
  DK:'#555555',LG:'#aaaaaa',
  DBLU:'#0000aa',DGRE:'#005500',DCYA:'#005555',
  DRED:'#aa0000',DYEL:'#aa5500',DMAG:'#aa00aa',
  SKY:'#0000aa',GND:'#005500',DIRT:'#aa5500',
  SKIN:'#ffaa55',WSKIN:'#ffcc88',
  BRICK:'#aa3300',STONE:'#888888',
};

// ═══════════════════════════════════════════════
// PIXEL-ART CHARACTERS (2×2 pixel grid)
// ═══════════════════════════════════════════════
// Each character drawn in a local coordinate system
// ox,oy = origin (feet level), s = pixel size (default 2)

function drawChar(ox,oy,pixels){
  // pixels = array of [px,py,color] where px,py in pixel units
  const s=2;
  for(const [px,py,col] of pixels){
    box(ox+px*s,oy+py*s,s,s,col);
  }
}

// ─── PATIENT (the player character) ───────────────────────────
// Victorian gentleman / patient in sanitarium gown
function drawPatient(ox,oy,frame,facing='right'){
  const f=Math.floor(frame)%4;
  const bob=(f===1||f===3)?-1:0;
  const ll=f<2?1:-1,rl=-ll;
  const s=2;
  const fl=facing==='left'?-1:1;
  function p(px,py,col){box(ox+px*s*fl+(facing==='left'?s:0),oy+(py+bob)*s,s,s,col);}
  // shadow
  cx.fillStyle='rgba(0,0,0,0.35)';cx.beginPath();cx.ellipse(ox+4,oy+20,10,3,0,0,Math.PI*2);cx.fill();
  // legs (gown — white)
  p(-1,8+ll,C.WH);p(1,8+rl,C.WH);
  p(-1,9+ll,'#cccccc');p(1,9+rl,'#cccccc');
  // gown body
  for(let bx=-2;bx<=2;bx++)for(let by=3;by<=7;by++)p(bx,by,C.WH);
  p(0,4,'#dddddd');p(0,5,'#dddddd'); // gown center line
  // arms
  p(-3,4+(f<2?-1:1),C.WH);p(3,4+(f<2?1:-1),C.WH);
  p(-3,5+(f<2?-1:1),C.WSKIN);p(3,5+(f<2?1:-1),C.WSKIN); // hands
  // neck
  p(0,2,C.WSKIN);
  // head
  p(-1,0,C.WSKIN);p(0,0,C.WSKIN);p(1,0,C.WSKIN);
  p(-1,1,C.WSKIN);p(0,1,C.WSKIN);p(1,1,C.WSKIN);
  p(-1,1,'#331100');p(1,1,'#331100'); // eyes
  // hair
  p(-1,-1,'#331100');p(0,-1,'#331100');p(1,-1,'#331100');
  p(2,-1,'#331100');
  // mustache
  p(-1,2,'#331100');p(0,2,'#331100');
}

// ─── DR. JOHN HARVEY KELLOGG ──────────────────────────────────
// All white coat + hat, beard, pointing finger, intense
function drawKellogg(ox,oy,frame){
  const bob=Math.floor(frame*0.4)%2?-1:0;
  const s=2;
  function p(px,py,col){box(ox+px*s,oy+(py+bob)*s,s,s,col);}
  cx.fillStyle='rgba(0,0,0,0.3)';cx.beginPath();cx.ellipse(ox+4,oy+20,10,3,0,0,Math.PI*2);cx.fill();
  // white coat legs
  p(-1,8,'#eeeecc');p(1,8,'#eeeecc');p(-1,9,'#ddddbb');p(1,9,'#ddddbb');
  // white coat body
  for(let bx=-2;bx<=2;bx++)for(let by=2;by<=7;by++)p(bx,by,'#ffffe8');
  p(0,3,'#ccccaa');p(0,4,'#ccccaa');p(0,5,'#ccccaa'); // coat center
  // pointing right arm
  p(3,3,'#ffffe8');p(4,3,'#ffffe8');p(5,3,C.WSKIN);p(6,3,C.WSKIN); // point!
  p(-3,4,'#ffffe8'); // other arm
  // neck
  p(0,1,C.WSKIN);p(0,2,C.WSKIN);
  // head
  p(-1,-1,C.WSKIN);p(0,-1,C.WSKIN);p(1,-1,C.WSKIN);
  p(-1,0,C.WSKIN);p(0,0,C.WSKIN);p(1,0,C.WSKIN);
  // intense eyes
  p(-1,0,'#330000');p(1,0,'#330000');
  p(-2,-1,'#221100');p(2,-1,'#221100'); // eyebrows furrowed
  // thick beard / mustache
  p(-1,1,'#ddddaa');p(0,1,'#ddddaa');p(1,1,'#ddddaa');
  p(-1,2,'#ccccaa');p(0,2,'#ccccaa');p(1,2,'#ccccaa');
  p(0,3,'#bbbbaa');
  // white top hat (tall)
  for(let hx=-2;hx<=2;hx++)p(hx,-2,'#ffffe8');
  for(let hx=-1;hx<=1;hx++){p(hx,-3,'#ffffd0');p(hx,-4,'#ffffd0');p(hx,-5,'#ffffd0');p(hx,-6,'#ffffd0');}
  // hat band
  for(let hx=-1;hx<=1;hx++)p(hx,-3,'#ccccaa');
}

// ─── WILL KELLOGG ─────────────────────────────────────────────
// Dark coat, exhausted, holds clipboard, stooped
function drawWill(ox,oy,frame){
  const bob=Math.floor(frame*0.25)%2?-1:0;
  const s=2;
  function p(px,py,col){box(ox+px*s,oy+(py+bob)*s,s,s,col);}
  cx.fillStyle='rgba(0,0,0,0.3)';cx.beginPath();cx.ellipse(ox+4,oy+20,10,3,0,0,Math.PI*2);cx.fill();
  p(-1,8,'#1a2a3a');p(1,8,'#1a2a3a');p(-1,9,'#0a1a2a');p(1,9,'#0a1a2a');
  for(let bx=-2;bx<=2;bx++)for(let by=2;by<=7;by++)p(bx,by,'#1a2a3a');
  // clipboard in right hand
  p(3,4,'#ccbb55');p(4,4,'#ccbb55');p(3,5,'#ccbb55');p(4,5,'#ccbb55');p(3,3,'#887730'); // clip
  p(-3,5,'#1a2a3a');
  // head — stooped slightly
  p(0,1,C.WSKIN);
  p(-1,0,C.WSKIN);p(0,0,C.WSKIN);p(1,0,C.WSKIN);
  p(-1,-1,C.WSKIN);p(0,-1,C.WSKIN);p(1,-1,C.WSKIN);
  // tired half-closed eyes
  p(-1,-1,'#222222');p(1,-1,'#555555');
  // bags under eyes
  p(-1,0,'#cc9966');p(1,0,'#cc9966');
  // dark hair, messy
  p(-1,-2,'#221108');p(0,-2,'#221108');p(1,-2,'#221108');p(2,-2,'#221108');p(-2,-1,'#221108');
  // dark plain hat
  for(let hx=-2;hx<=2;hx++)p(hx,-3,'#111008');
  for(let hx=-1;hx<=1;hx++){p(hx,-4,'#111008');p(hx,-5,'#111008');}
}

// ─── CW POST ──────────────────────────────────────────────────
// Fancy dark suit, scheming expression, gold watch chain
function drawPost(ox,oy,frame){
  const f=Math.floor(frame)%4;
  const bob=(f===1||f===3)?-1:0;
  const s=2;
  function p(px,py,col){box(ox+px*s,oy+(py+bob)*s,s,s,col);}
  cx.fillStyle='rgba(0,0,0,0.3)';cx.beginPath();cx.ellipse(ox+4,oy+20,10,3,0,0,Math.PI*2);cx.fill();
  p(-1,8,'#2a1008');p(1,8,'#2a1008');p(-1,9,'#1a0a05');p(1,9,'#1a0a05');
  for(let bx=-2;bx<=2;bx++)for(let by=2;by<=7;by++)p(bx,by,'#2a1510');
  // waistcoat
  p(0,3,'#885522');p(0,4,'#885522');p(0,5,'#885522');
  // gold watch chain
  p(-1,5,'#ccaa33');p(-2,4,'#ccaa33');
  // coin/bag
  p(3,5,'#ccaa33');p(4,5,'#ccaa33');p(3,4,'#ccaa33');
  p(-3,4,'#2a1510');
  p(0,1,C.WSKIN);
  p(-1,0,C.WSKIN);p(0,0,C.WSKIN);p(1,0,C.WSKIN);
  p(-1,-1,C.WSKIN);p(0,-1,C.WSKIN);p(1,-1,C.WSKIN);
  // scheming narrow eyes
  p(-1,-1,'#330800');p(1,-1,'#330800');
  p(-1,0,'#552200');p(1,0,'#552200'); // raised eyebrows (scheming)
  // thin mustache
  p(-1,1,'#331100');p(0,1,'#331100');p(1,1,'#331100');
  // tall dark top hat
  for(let hx=-2;hx<=2;hx++)p(hx,-2,'#0a0500');
  for(let hx=-1;hx<=1;hx++){p(hx,-3,'#0a0500');p(hx,-4,'#0a0500');p(hx,-5,'#0a0500');p(hx,-6,'#0a0500');}
  p(-2,-2,'#0a0500');p(2,-2,'#0a0500');
}

// ─── NURSE ────────────────────────────────────────────────────
// White uniform, cap, carrying tray/pot, cheerful (disturbingly so)
function drawNurse(ox,oy,frame,carrying='tray'){
  const f=Math.floor(frame)%4;
  const bob=(f===1||f===3)?-1:0;
  const s=2;
  function p(px,py,col){box(ox+px*s,oy+(py+bob)*s,s,s,col);}
  cx.fillStyle='rgba(0,0,0,0.3)';cx.beginPath();cx.ellipse(ox+4,oy+20,10,3,0,0,Math.PI*2);cx.fill();
  // white uniform legs
  p(-1,8,'#eeeedd');p(1,8,'#eeeedd');p(-1,9,'#ddddcc');p(1,9,'#ddddcc');
  // white uniform body
  for(let bx=-2;bx<=2;bx++)for(let by=2;by<=7;by++)p(bx,by,'#fffef0');
  // red cross on chest
  p(0,3,C.RD);p(0,4,C.RD);p(-1,4,C.RD);p(1,4,C.RD);
  // what she's carrying
  if(carrying==='tray'){
    // tray held out
    p(3,4,'#aaaa88');p(4,4,'#aaaa88');p(5,4,'#aaaa88');p(3,5,'#888866');
    // bowl on tray
    p(4,3,'#cc9944');p(5,3,'#cc9944');
  } else if(carrying==='pot'){
    // yogurt pot — brown, round
    p(3,4,C.DYEL);p(4,4,C.DYEL);p(5,4,C.DYEL);
    p(3,5,C.DYEL);p(4,5,C.DYEL);p(5,5,C.DYEL);
    p(3,3,C.DYEL);p(4,3,'#885522'); // handle/top
    // YOGURT label suggestion
    p(4,4,'#ffe8c0');p(5,4,'#ffe8c0');
  } else if(carrying==='enema'){
    // rubber bag + tube (the dreaded item)
    p(3,3,C.RD);p(4,3,C.RD);p(3,4,C.RD);p(4,4,C.RD); // bag
    p(5,5,'#cc4422');p(6,6,'#cc4422'); // tube
  }
  p(-3,5,'#fffef0'); // other arm
  p(0,1,C.WSKIN);
  p(-1,0,C.WSKIN);p(0,0,C.WSKIN);p(1,0,C.WSKIN);
  p(-1,-1,C.WSKIN);p(0,-1,C.WSKIN);p(1,-1,C.WSKIN);
  // BIG smile (disturbingly cheerful)
  p(-1,0,C.DRED);p(1,0,C.DRED); // eyes — kind
  p(-1,1,'#cc4444');p(0,1,'#cc4444');p(1,1,'#cc4444'); // wide smile
  // Nurse cap
  box(ox-2*s,oy-3*s,10*s,s*2,'#fffef0');
  box(ox-s,oy-4*s,8*s,s,'#fffef0');
  // Red cross on cap
  box(ox+2*s,oy-4*s,2*s,s*3,'#dd2222');
  box(ox+s,oy-3*s,4*s,s,'#dd2222');
}

// ─── DOCTOR (generic sanitarium doctor) ────────────────────────
// Dark suit, stethoscope, concerned expression
function drawDoctor(ox,oy,frame){
  const bob=Math.floor(frame*0.35)%2?-1:0;
  const s=2;
  function p(px,py,col){box(ox+px*s,oy+(py+bob)*s,s,s,col);}
  cx.fillStyle='rgba(0,0,0,0.3)';cx.beginPath();cx.ellipse(ox+4,oy+20,10,3,0,0,Math.PI*2);cx.fill();
  p(-1,8,'#1a1a2a');p(1,8,'#1a1a2a');p(-1,9,'#0a0a1a');p(1,9,'#0a0a1a');
  for(let bx=-2;bx<=2;bx++)for(let by=2;by<=7;by++)p(bx,by,'#1a1a2a');
  // white shirt / cravat
  p(0,2,C.WH);p(0,3,C.WH);
  // stethoscope around neck
  p(-2,3,'#887755');p(-2,4,'#887755');p(-1,5,'#887755');p(0,5,'#887755');p(1,5,'#887755');
  p(2,4,'#887755');p(2,3,'#887755');p(3,3,'#aaaaaa');
  p(-3,5,'#1a1a2a');p(3,5,'#1a1a2a');
  p(0,1,C.WSKIN);
  p(-1,0,C.WSKIN);p(0,0,C.WSKIN);p(1,0,C.WSKIN);
  p(-1,-1,C.WSKIN);p(0,-1,C.WSKIN);p(1,-1,C.WSKIN);
  p(-1,-1,'#1a1a3a');p(1,-1,'#1a1a3a'); // concerned eyes
  p(-1,0,'#994422'); // worried mouth
  // spectacles
  cx.strokeStyle='#ccaa33';cx.lineWidth=1;
  cx.strokeRect(ox-4,oy-2,5,4);cx.strokeRect(ox+2,oy-2,5,4);
  cx.beginPath();cx.moveTo(ox,oy-1);cx.lineTo(ox+2,oy-1);cx.stroke();
  // neat hair
  for(let hx=-1;hx<=2;hx++)p(hx,-2,'#221108');
  p(-2,-1,'#221108');
  // bowler hat
  for(let hx=-2;hx<=2;hx++)p(hx,-3,'#1a1a28');
  for(let hx=-1;hx<=1;hx++){p(hx,-4,'#1a1a28');p(hx,-5,'#1a1a28');}
}

// ─── HENRY FORD (cameo patient) ───────────────────────────────
// Famous thin face, dark suit, he's watching judgmentally
function drawFord(ox,oy,frame){
  const bob=Math.floor(frame*0.2)%2?-1:0;
  const s=2;
  function p(px,py,col){box(ox+px*s,oy+(py+bob)*s,s,s,col);}
  cx.fillStyle='rgba(0,0,0,0.3)';cx.beginPath();cx.ellipse(ox+4,oy+20,10,3,0,0,Math.PI*2);cx.fill();
  p(-1,8,'#111118');p(1,8,'#111118');p(-1,9,'#0a0a10');p(1,9,'#0a0a10');
  for(let bx=-2;bx<=2;bx++)for(let by=2;by<=7;by++)p(bx,by,'#111118');
  p(0,2,'#eeeedd');p(0,3,'#eeeedd'); // shirt
  // arms crossed (disapproving)
  p(-3,4,'#111118');p(-4,4,'#111118');p(3,4,'#111118');p(4,4,'#111118');
  p(-3,5,'#111118');p(3,5,'#111118');
  p(0,1,C.WSKIN);
  // thin face
  p(-1,0,C.WSKIN);p(0,0,C.WSKIN);p(1,0,C.WSKIN);
  p(-1,-1,C.WSKIN);p(0,-1,C.WSKIN);p(1,-1,C.WSKIN);
  p(0,-2,C.WSKIN);p(-1,-2,C.WSKIN); // longer thin face
  // judgy eyes, thin line mouth
  p(-1,-1,'#220000');p(1,-1,'#220000');
  p(-1,0,'#993322');p(1,0,'#993322'); // stern eyebrows
  p(0,1,'#aa4422'); // thin line mouth (disapproving)
  // slicked back hair
  for(let hx=-1;hx<=2;hx++)p(hx,-3,'#1a1008');
  p(-2,-2,'#1a1008');p(-1,-2,'#1a1008');p(-2,-1,'#1a1008');
  // dark derby
  for(let hx=-2;hx<=2;hx++)p(hx,-4,'#111008');
  for(let hx=-1;hx<=1;hx++){p(hx,-5,'#111008');p(hx,-6,'#111008');}
}

// ═══════════════════════════════════════════════
// SANITARIUM WORLD RENDERER
// ═══════════════════════════════════════════════
// Oregon Trail style: top half = scrolling scene, bottom half = text

const GY=210; // ground Y (where bottom of scene is)

// Scenery objects for each scene type
function drawScene(sceneType,scrollX,walkF){
  switch(sceneType){
    case 'approach':    drawApproach(scrollX,walkF); break;
    case 'lobby':       drawLobby(scrollX,walkF); break;
    case 'lecture':     drawLectureHall(scrollX,walkF); break;
    case 'hydrotherapy':drawHydroWing(scrollX,walkF); break;
    case 'kitchen_day': drawKitchenDay(scrollX,walkF); break;
    case 'sunroom':     drawSunroom(scrollX,walkF); break;
    case 'kitchen_night':drawKitchenNight(scrollX,walkF); break;
    case 'office':      drawOffice(scrollX,walkF); break;
    case 'victory':     drawVictoryScene(scrollX,walkF); break;
    default:            drawApproach(scrollX,walkF);
  }
}

// ─── SHARED HELPERS ───────────────────────────────────────────
function drawSkyGround(skyCol,gndCol,horizonCol){
  box(0,0,W,GY,skyCol);
  hln(GY-1,horizonCol);
  hln(GY,horizonCol);
  box(0,GY,W,H-GY,gndCol);
}

function drawRoad(scrollX,pathCol,dashCol){
  box(0,GY+5,W,25,pathCol);
  hln(GY+5,darken(pathCol,-30));
  hln(GY+28,darken(pathCol,-30));
  // dashes
  for(let x=(-scrollX*0.7)%36-36;x<W+36;x+=36){
    box(~~x,GY+15,18,3,dashCol);
  }
}

function scrollTree(scrollX,baseX,i,height,gndCol){
  const speed=0.7+i%3*0.1;
  const x=((baseX-scrollX*speed)%1200+1200)%1200-60;
  if(x<-60||x>W+10) return;
  box(x+8,GY-height,6,height,'#5a3010');
  box(x,GY-height-10,22,height*0.6+10,gndCol==='#002200'?'#003300':'#005500');
  box(x+3,GY-height-20,16,(height*0.4)+12,gndCol==='#002200'?'#004400':'#007700');
  box(x+6,GY-height-28,10,12,C.GR);
}

// ─── SCENE: EXTERIOR APPROACH TO SANITARIUM ──────────────────
function drawApproach(scrollX,walkF){
  drawSkyGround(C.SKY,'#003300','#002200');
  // Sun or moon
  box(500,30,28,28,C.YL);box(504,34,20,20,'#ffee00');box(508,38,12,12,'#ffdd00');

  // Far background — sanitarium building (slow parallax)
  const bx=~~(400-scrollX*0.08);
  if(bx>-200&&bx<W+20){
    // Main building — large Victorian structure
    box(bx,GY-120,280,120,C.STONE);
    box(bx,GY-122,280,5,'#aaaaaa');
    // Roof gables
    cx.fillStyle='#774422';
    cx.beginPath();cx.moveTo(bx-10,GY-120);cx.lineTo(bx+140,GY-165);cx.lineTo(bx+290,GY-120);cx.closePath();cx.fill();
    cx.beginPath();cx.moveTo(bx+80,GY-120);cx.lineTo(bx+180,GY-145);cx.lineTo(bx+280,GY-120);cx.closePath();cx.fill();
    // Windows (3 rows)

// ═══════════════════════════════════════════════
// HUD
// ═══════════════════════════════════════════════
function drawHUD(G){
  box(0,0,W,22,'#000022');
  hln(22,C.CY);hln(23,'#003344');
  T('SANITY:',6,5,C.DK,7);
  box(58,7,84,8,'#001100');box(58,7,~~(G.sanity*0.84),8,G.sanity>60?C.GR:G.sanity>30?C.YL:C.RD);
  cx.strokeStyle='#003300';cx.lineWidth=1;cx.strokeRect(58,7,84,8);
  T(G.sanity+'%',148,5,C.GR,7);
  T('BOWEL:',195,5,C.DK,7);
  const bn=['CRITICAL','POOR','OKAY','GOOD','OPTIMAL'];
  T(bn[Math.max(0,Math.min(4,G.bowel))],245,5,C.YL,7);
  T('ENEMAS:',360,5,C.DK,7);
  T(String(G.enemas),415,5,C.CY,7);
  T('KELLOGG:',445,5,C.DK,7);
  T('*'.repeat(G.approval)+'.'.repeat(Math.max(0,5-G.approval)),502,5,C.YL,7);
  TR('DAY '+G.day+'  ['+Math.min(sceneIdx+1,gameEvents.length||11)+'/11]',W-6,5,C.WH,7);
}

// ═══════════════════════════════════════════════
// TRAVEL PROGRESS BAR
// ═══════════════════════════════════════════════
function drawProgressBar(dist,goal){
  const by=H-36,bh=14,bx=8,bw=W-16;
  T('TRAVELING TO NEXT STOP...',bx,by-14,C.DK,7);
  box(bx,by,bw,bh,'#001100');
  box(bx,by,~~(dist/goal*bw),bh,'#002200');
  const prog=~~(dist/goal*bw);
  // Wagon icon on progress bar
  box(bx+prog-4,by-2,10,bh+4,'#005500');
  box(bx+prog-3,by-1,8,bh+2,C.GR);
  cx.strokeStyle='#003300';cx.lineWidth=1;cx.strokeRect(bx,by,bw,bh);
}

// ═══════════════════════════════════════════════
// TEXT BOX (bottom half)
// ═══════════════════════════════════════════════
const TB_Y=GY+4; // top of text box

function drawEventBox(ev,hoverChoice){
  box(0,GY,W,H-GY,'#000022');
  hln(GY,C.CY);hln(GY+1,'#003344');
  // Header row
  T(ev.header,8,TB_Y+4,C.YL,8);
  TR(ev.sub,W-8,TB_Y+4,C.CY,7);
  hln(TB_Y+17,'#003344');hln(TB_Y+18,C.DCYA);

  // Lines
  let ty=TB_Y+23;
  ev.lines.forEach(line=>{
    const col=line.startsWith('"')||line.startsWith('WILL')||line.startsWith('JOHN')?C.CY:
              line===''?C.BK:C.WH;
    T(line,8,ty,col,7);ty+=11;
  });
  if(ev.fact){
    hln(ty+1,'#553300');
    T(ev.fact,8,ty+4,C.DYEL,6);ty+=14;
  }
  hln(ty+2,'#003344');ty+=7;

  ev.choices.forEach((ch,i)=>{
    const y2=ty+i*15;
    if(hoverChoice===i)box(4,y2-1,W-8,13,'#002200');
    T(ch.k+'.',8,y2,hoverChoice===i?C.GR:C.DK,7);
    T(ch.t,20,y2,hoverChoice===i?C.GR:C.WH,7);
  });
}

function drawOutcomeBox(od,hoverCont,mouseY2){
  // Left side: sprite background then sprite
  box(0,GY,220,H-GY,'#000011');
  if(od.type==='good')drawGoodSprite(58,GY+38);
  else if(od.type==='bad')drawBadSprite(58,GY+28);
  else drawNeutralSprite(58,GY+28);
  box(220,GY,1,H-GY,C.CY);
  // Right side: result
  const tx=228,ty=GY+4,tw=W-tx-8;
  box(tx-2,GY,W-tx+2,H-GY,'#000022');
  hln(GY,C.CY);hln(GY+1,'#003344');
  const banCol=od.type==='good'?C.GR:od.type==='bad'?C.RD:C.LG;
  const banTxt=od.type==='good'?'[ GOOD CHOICE ]':od.type==='bad'?'[ BAD CHOICE ]':'[ NEUTRAL ]';
  T(banTxt,tx,ty+4,banCol,8);
  hln(ty+16,'#003344');
  const rlines=wrap(od.msg,tw-4,7);
  let ry=ty+20;
  rlines.forEach(l=>{T(l,tx,ry,C.WH,7);ry+=12;});
  ry+=6;
  od.statChanges.forEach(({label,delta})=>{
    T((delta>0?'+':'')+delta+' '+label,tx,ry,delta>0?C.GR:C.RD,7);ry+=12;
  });
  hln(H-28,'#003344');
  const contHov=mouseY2>=H-26&&mouseY2<=H-4;
  T('SPACE OR CLICK TO CONTINUE  >>',tx,H-24,contHov?C.YL:C.GR,7);
}

// ═══════════════════════════════════════════════
// TITLE / END SCREENS
// ═══════════════════════════════════════════════

  drawScene('approach',scrollX,walkF);
  drawPatient(100,GY-20,walkF);
  drawKellogg(460,GY-20,walkF);
  drawNurse(510,GY-20,walkF,'tray');
  drawHUD({sanity:100,bowel:3,approval:5,enemas:0,day:1});

  box(40,30,W-80,H-55,'#000022');
  dbox(40,30,W-80,H-55,'#000022',C.CY);

  TC('THE KELLOGG TRAIL',60,C.YL,18);
  TC('BATTLE CREEK SANITARIUM',88,C.CY,9);
  TC('MICHIGAN, 1894',100,C.DCYA,7);
  hln(114,C.DBLU);hln(115,'#001133');
  TC('Survive Dr. Kellogg\'s bowel health regime.',122,C.WH,7);
  TC('Endure the yogurt enemas.',135,C.WH,7);
  TC('Witness the discovery of corn flakes.',148,C.WH,7);
  TC('(Everything in this game actually happened.)',162,C.LG,7);
  hln(178,C.DBLU);
  if(blink)TC('PRESS SPACE OR CLICK TO BEGIN',188,C.GR,9);
  TC('USE NUMBER KEYS 1-3 OR CLICK TO CHOOSE',204,C.DK,7);
  TC('"32 CHEWS PER BITE. EVERY BITE." -- DR. KELLOGG',222,C.DK,6);
}

function drawDeathEnd(G,hov){
  box(0,0,W,H,'#000008');
  drawDeathSprite();
  box(0,196,W,H-196,'rgba(0,0,8,0.88)');
  hln(196,C.RD);hln(197,'#440000');
  TC('YOU HAVE DIED',205,C.RD,16);
  hln(228,C.DRED);
  TC('Your sanity was reorganized by Dr. Kellogg\'s regime.',236,C.LG,7);
  TC('You were last seen writing pamphlets about bowels.',249,C.LG,7);
  TC('The banker from Chicago seemed very concerned.',262,C.DK,7);
  TC('Days survived: '+G.day+'      Enemas endured: '+G.enemas,280,C.YL,7);
  dbox(W/2-90,302,180,28,'#000',hov?C.YL:C.RD);
  TC('TRY AGAIN',310,hov?C.YL:C.RD,9);

}

function drawVictoryEnd(G,hov,scrollX,walkF){
  drawScene('victory',scrollX,walkF);
  drawPatient(100,GY-20,walkF);
  drawWill(180,GY-20,walkF);
  drawNurse(240,GY-20,walkF,'tray');
  drawKellogg(500,GY-20,0); // frozen, distant, disapproving
  drawVictorySprite(W-130,120);
  box(20,GY-2,W-40,H-GY-4,'rgba(0,0,20,0.92)');
  hln(GY,C.YL);hln(GY+1,'#554400');
  TC('CORN FLAKES DISCOVERED',GY+10,C.YL,12);
  TC('BATTLE CREEK, MICHIGAN  1894',GY+28,C.CY,8);
  hln(GY+40,'#003344');
  TC('You survived the grape cure, the yogurt enemas,',GY+48,C.WH,7);
  TC('and C.W. Post\'s suspicious napkin diagrams.',GY+61,C.WH,7);
  TC('In a basement kitchen at midnight, you were there',GY+74,C.WH,7);
  TC('when Will Kellogg discovered breakfast cereal.',GY+87,C.WH,7);
  TC('Final sanity: '+G.sanity+'%   Enemas: '+G.enemas+'   Kellogg approval: '+G.approval+'/5',GY+104,C.YL,7);
  dbox(W/2-100,GY+122,200,26,'#000',hov?C.YL:C.GR);
  TC('PLAY AGAIN',GY+128,hov?C.YL:C.GR,9);
  drawHUD(G);
}

// ═══════════════════════════════════════════════
// INPUT
// ═══════════════════════════════════════════════
let mouseX=0,mouseY=0;
function getMouse(e){
  const r=cv.getBoundingClientRect();
  mouseX=(e.clientX-r.left)*(W/r.width);
  mouseY=(e.clientY-r.top)*(H/r.height);
}
cv.addEventListener('mousemove',e=>{
  getMouse(e);
  updateHover();
});
cv.addEventListener('click',e=>{getMouse(e);handleClick();});
cv.addEventListener('touchstart',e=>{
  e.preventDefault();
  const r=cv.getBoundingClientRect();
  const t=e.touches[0];
  mouseX=(t.clientX-r.left)*(W/r.width);
  mouseY=(t.clientY-r.top)*(H/r.height);
  handleClick();
},{passive:false});
window.addEventListener('keydown',e=>{
  if(state==='title'&&(e.key===' '||e.key==='Enter')){startGame();return;}
  if(state==='event'){
    const i=parseInt(e.key)-1;
    if(i>=0&&i<3)pickChoice(i);
  }
  if(state==='outcome'&&(e.key===' '||e.key==='Enter'))continueAfterOutcome();
  if((state==='death'||state==='victory')&&(e.key===' '||e.key==='Enter'))restartGame();
});

let hoverChoice=-1;
function updateHover(){
  hoverChoice=-1;
  if(state==='event'&&currentEvent){
    const ev=currentEvent;
    let ty=TB_Y+23;
    ev.lines.forEach(l=>ty+=11);
    if(ev.fact)ty+=14;
    ty+=7;
    ev.choices.forEach((ch,i)=>{
      const y2=ty+i*15;
      if(mouseY>=y2-1&&mouseY<=y2+13&&mouseX>=4&&mouseX<=W-4)hoverChoice=i;
    });
  }
}
function handleClick(){
  if(state==='title'){startGame();return;}
  if(state==='event'&&currentEvent){
    const ev=currentEvent;
    let ty=TB_Y+23;
    ev.lines.forEach(l=>ty+=11);
    if(ev.fact)ty+=14;
    ty+=7;
    for(let i=0;i<ev.choices.length;i++){
      const y2=ty+i*15;
      if(mouseY>=y2-1&&mouseY<=y2+13){pickChoice(i);return;}
    }
  }
  if(state==='outcome'&&mouseY>=H-28)continueAfterOutcome();
  if(state==='death'&&mouseY>=302&&mouseY<=330)restartGame();
  if(state==='victory'&&mouseY>=GY+122&&mouseY<=GY+150)restartGame();
}

// ═══════════════════════════════════════════════
// GAME LOGIC
// ═══════════════════════════════════════════════
let state='title';
let G={sanity:75,bowel:3,approval:5,enemas:0,day:1};
let sceneIdx=0;
let currentEvent=null;
let gameEvents=[];
let outcomeData=null;
let scroll=0,walkF=0;
let travelDist=0,travelGoal=100;
let titleT=0;

function shuffleChoices(events){
  return events.map(ev=>{
    const choices=[...ev.choices].sort(()=>Math.random()-0.5)
      .map((c,i)=>Object.assign({},c,{k:String(i+1)}));
    return Object.assign({},ev,{choices});
  });
}
function startGame(){
  gameEvents=shuffleChoices(EVENTS);
  state='travel';travelDist=0;travelGoal=90;sceneIdx=0;
  currentEvent=null;outcomeData=null;
}
function triggerEvent(idx){
  currentEvent=gameEvents[idx];
  G.day=currentEvent.day;
  state='event';hoverChoice=-1;
}
function pickChoice(i){
  if(!currentEvent||!currentEvent.choices[i])return;
  const ch=currentEvent.choices[i];
  const e=ch.e||{};const changes=[];
  if(e.sanity){changes.push({label:'SANITY',delta:e.sanity});G.sanity=Math.max(0,Math.min(100,G.sanity+e.sanity));}
  if(e.bowel){changes.push({label:'BOWEL',delta:e.bowel});G.bowel=Math.max(0,Math.min(4,G.bowel+e.bowel));}
  if(e.approval){changes.push({label:'KELLOGG',delta:e.approval});G.approval=Math.max(0,Math.min(5,G.approval+e.approval));}
  if(e.enemas){changes.push({label:'ENEMAS',delta:e.enemas});G.enemas+=e.enemas;}
  outcomeData={type:ch.o,msg:ch.r,statChanges:changes};
  state='outcome';
}
function continueAfterOutcome(){
  if(G.sanity<=0){state='death';return;}
  sceneIdx++;
  if(sceneIdx>=gameEvents.length){state='victory';return;}
  state='travel';travelDist=0;travelGoal=80+Math.random()*40;
  currentEvent=null;
}
function restartGame(){
  G={sanity:100,bowel:3,approval:5,enemas:0,day:1};
  sceneIdx=0;scroll=0;travelDist=0;travelGoal=90;
  currentEvent=null;outcomeData=null;state='title';
}

// ═══════════════════════════════════════════════
// MAIN LOOP
// ═══════════════════════════════════════════════
let lastT=0;
function loop(ts){
  requestAnimationFrame(loop);
  const dt=Math.min(ts-lastT,50)/16;lastT=ts;
  cx.clearRect(0,0,W,H);

  scroll+=1.2*dt;walkF+=0.09*dt;titleT+=0.04*dt;

  if(state==='title'){
    scroll+=0.6*dt;
    drawTitle(scroll,walkF,Math.floor(titleT*2)%2===0);
    return;
  }
  if(state==='travel'){
    scroll+=2.5*dt;travelDist+=2.5*dt;
    const ev=gameEvents[sceneIdx];
    drawScene(ev.scene,scroll,walkF);
    drawPatient(100,GY-20,walkF);
    placeNPCs(ev.scene,walkF);
    drawHUD(G);
    // Grey out bottom for travel bar
    box(0,GY,W,H-GY,'#000022');
    hln(GY,C.CY);hln(GY+1,'#003344');
    drawProgressBar(travelDist,travelGoal);
    if(travelDist>=travelGoal)triggerEvent(sceneIdx);
    return;
  }
  if(state==='event'&&currentEvent){
    const ev=currentEvent;
    drawScene(ev.scene,scroll*0.3,walkF*0.15);
    drawPatient(100,GY-20,walkF*0.15);
    placeNPCs(ev.scene,walkF);
    drawHUD(G);
    drawEventBox(ev,hoverChoice);
    return;
  }
  if(state==='outcome'&&outcomeData&&currentEvent){
    const ev=currentEvent;
    drawScene(ev.scene,scroll*0.2,walkF*0.05);
    drawPatient(100,GY-20,walkF*0.05);
    placeNPCs(ev.scene,walkF*0.05);
    drawHUD(G);
    drawOutcomeBox(outcomeData,mouseY>=H-28,mouseY);
    return;
  }
  if(state==='death'){
    const hov=mouseY>=302&&mouseY<=330;
    drawDeathEnd(G,hov);return;
  }
  if(state==='victory'){
    scroll+=1.5*dt;
    const hov=mouseY>=GY+122&&mouseY<=GY+150;
    drawVictoryEnd(G,hov,scroll,walkF);return;
  }
}
requestAnimationFrame(loop);
</script>
